[default]
# Skip short hex tokens (likely git short SHAs / hashes) like `a3ba3b40` so
# typos doesn't flag the embedded `ba`/`be`/`teh`/etc. substrings.
extend-ignore-re = [
  "\\b[0-9a-fA-F]{7,40}\\b",
  "\\bANDed\\b",
]

[default.extend-words]
# Gradle property flag: `-P<name>` sets project property `<name>` to true.
# Used in build defaults: `gradle build -Prelease`.
Prelease = "Prelease"
# Used as a deliberate misspelling in a parse-error test fixture
# (crates/alef-core/src/config/new_config.rs ~line 684).
wrkspace = "wrkspace"
# "abl" is the tree-sitter language identifier for the ABL (OpenEdge) grammar,
# used in e2e fixture examples and doc comments.
abl = "abl"
# Common parser terminology used in tests for invalid generated syntax.
unparseable = "unparseable"
# "tring" appears in a docstring/comment that quotes the literal truncated tail
# of a corrupted C# file ("...tring message, Exception innerException...") — the
# corruption itself is the subject of the test, so the typo is intentional.
tring = "tring"
