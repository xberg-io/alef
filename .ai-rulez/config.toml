# AI-Rulez Configuration (migrated to V4 TOML format)
# Documentation: https://github.com/Goldziher/ai-rulez

version = '4.0'
name = 'Alef'
description = 'Polyglot binding generator that produces type-safe language bindings for Rust libraries (Python/TypeScript/Ruby/Java/Go/Elixir/C#/PHP/R/WASM)'
gitignore = true
presets = ['claude', 'codex', 'copilot', 'cursor', 'antigravity']
builtins = ['rust', 'default-commands']

[[includes]]
name = 'kreuzberg-core'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/core'
merge_strategy = 'local-override'
