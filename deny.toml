[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "Zlib",
  "Unlicense",
  "CC0-1.0",
  "Unicode-3.0",
  "BSL-1.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# hashbrown 0.16 (via referencing/jsonschema) and 0.17 (via indexmap/serde_yaml)
# coexist as transitive deps — can't resolve without upstream changes.
skip = [
  { crate = "hashbrown@0.16", reason = "transitive via referencing/jsonschema" },
]
allow = []
deny = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
