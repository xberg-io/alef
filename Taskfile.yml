version: "3"

vars:
  RUST_LOG: info

tasks:
  setup:
    desc: "Set up the development environment"
    cmds:
      - rustup update stable
      - cargo install prek || true
      - cargo install cargo-deny || true
      - cargo install cargo-machete || true
      - cargo install cargo-sort || true
      - cargo install cargo-edit || true
      - prek install
      - prek install --hook-type commit-msg

  update:
    desc: "Update dependencies and pre-commit hooks"
    cmds:
      - prek autoupdate
      - cargo update

  upgrade:
    desc: "Upgrade dependencies to latest (including incompatible) then update"
    cmds:
      - cargo upgrade --incompatible
      - task: update

  build:
    desc: "Build all crates"
    cmds:
      - cargo build --workspace

  build:release:
    desc: "Build release binary"
    cmds:
      - cargo build --release -p alef-cli

  test:
    desc: "Run all tests"
    cmds:
      - cargo test --workspace

  test:release:
    desc: "Run all tests in release mode (catches release-only optimizer/lifetime issues)"
    cmds:
      - cargo test --release --workspace

  bench:
    desc: "Run codegen benchmarks (criterion) for new-language backends"
    cmds:
      - cargo bench -p alef-backend-kotlin
      - cargo bench -p alef-backend-swift
      - cargo bench -p alef-backend-dart
      - cargo bench -p alef-backend-gleam
      - cargo bench -p alef-backend-zig

  check:
    desc: "Type-check all crates"
    cmds:
      - cargo check --workspace

  fmt:
    desc: "Format all code"
    cmds:
      - cargo fmt --all

  lint:
    desc: "Run all linters via prek"
    cmds:
      - prek run --all-files

  set-version:
    desc: "Set workspace version (usage: task set-version -- 0.8.0)"
    requires:
      vars: [CLI_ARGS]
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - |
        sed -i '' "s/^version = \".*\"/version = \"{{.VERSION}}\"/" Cargo.toml
        sed -i '' -E "s|^(alef-[a-z0-9-]+ = \{ version = )\"[0-9]+\.[0-9]+\.[0-9]+\"|\\1\"{{.VERSION}}\"|" Cargo.toml
        sed -i '' "s/pub const ALEF_REV: &str = \"v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\";/pub const ALEF_REV: \&str = \"v{{.VERSION}}\";/" crates/alef-core/src/template_versions.rs
      - cargo update --workspace

  clean:
    desc: "Clean build artifacts"
    cmds:
      - cargo clean
      - rm -rf .alef/
