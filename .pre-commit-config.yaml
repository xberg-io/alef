default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: ^target/|\.alef/
repos:
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.2.1
    hooks:
      - id: ai-rulez-generate
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
      - id: check-toml
      - id: check-case-conflict
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.17
    hooks:
      - id: cargo-sort
        args:
          - -w
      - id: cargo-fmt
        args:
          - --all
      - id: cargo-check
        args:
          - --workspace
          - --all-targets
      - id: cargo-clippy
        args:
          - --fix
          - --allow-dirty
          - --allow-staged
          - --workspace
          - --all-targets
          - --
          - -D
          - warnings
      - id: cargo-machete
      - id: cargo-deny
        args:
          - check
      - id: shfmt
        args:
          - -w
          - -i
          - '2'
      - id: shellcheck
      - id: oxfmt
      - id: rumdl-fmt
      - id: mypy
        files: ^hooks/.*\.py$
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos
        args:
          - --force-exclude
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args:
          - --fix
        files: ^hooks/.*\.py$
      - id: ruff-format
        files: ^hooks/.*\.py$
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.3
    hooks:
      - id: gh-actions-updater
